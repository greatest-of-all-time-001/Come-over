<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Come? 💌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --plum-deep:   #3a1220;
    --plum:        #5c1f30;
    --rose:        #b5495b;
    --blush:       #f6e4e2;
    --cream:       #fdf6f0;
    --gold:        #c9a35a;
    --gold-soft:   #e3caa0;
    --ink:         #3a1220;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    height:100%;
    overflow:hidden;
  }

  body{
    font-family:'Jost', sans-serif;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(197,140,140,0.35), transparent 55%),
      radial-gradient(ellipse at 85% 80%, rgba(140,50,70,0.45), transparent 55%),
      linear-gradient(160deg, var(--plum-deep) 0%, var(--plum) 55%, #7a2c3f 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  /* ambient floating hearts */
  .ambient{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }
  .ambient span{
    position:absolute;
    bottom:-40px;
    color:rgba(230,190,190,0.35);
    font-size:18px;
    animation:drift linear infinite;
    user-select:none;
  }
  @keyframes drift{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:1; }
    100%{ transform:translateY(-110vh) translateX(var(--dx,20px)) rotate(360deg); opacity:0; }
  }

  .stage{
    position:relative;
    width:min(92vw, 460px);
    z-index:2;
  }

  .card{
    position:relative;
    background: var(--cream);
    border-radius:22px;
    padding:52px 38px 44px;
    box-shadow:
      0 30px 60px -20px rgba(20,5,10,0.55),
      0 0 0 1px rgba(201,163,90,0.25);
    text-align:center;
    overflow:visible;
    min-height:400px;
  }

  .card::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid var(--gold-soft);
    border-radius:16px;
    pointer-events:none;
  }

  .eyebrow{
    font-family:'Jost', sans-serif;
    letter-spacing:0.32em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--rose);
    margin:0 0 14px;
  }

  h1{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(28px, 6vw, 36px);
    color:var(--ink);
    line-height:1.25;
    margin:0 0 10px;
  }

  .sub{
    font-family:'Cormorant Garamond', serif;
    font-size:18px;
    color:#7a5560;
    margin:0 0 36px;
  }

  .btn-row{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    height:64px;
  }

  button{
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size:16px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    padding:15px 34px;
    transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
  }

  #yes{
    background: linear-gradient(135deg, var(--rose), #8c2f43);
    color:var(--cream);
    box-shadow:0 10px 24px -8px rgba(140,47,67,0.6);
    letter-spacing:0.02em;
  }
  #yes:hover{ transform:translateY(-2px) scale(1.04); box-shadow:0 14px 30px -8px rgba(140,47,67,0.7); }

  #no{
    position:relative;
    background:linear-gradient(135deg, #ff4d5e, #ff2e46);
    color:#fff;
    border:none;
    box-shadow:0 10px 24px -6px rgba(255,46,70,0.65), 0 0 0 3px rgba(255,255,255,0.6);
  }
  #no.escaping{
    position:fixed;
    z-index:50;
  }

  .hint{
    margin-top:26px;
    font-size:13px;
    color:#a98a92;
    min-height:18px;
    font-style:italic;
    font-family:'Cormorant Garamond', serif;
    font-size:17px;
  }

  /* reveal screen */
  .reveal{
    display:none;
    text-align:center;
  }
  .reveal.show{ display:block; }
  .card.flipped .ask{ display:none; }

  .reveal .stamp{
    font-size:42px;
    margin-bottom:6px;
  }

  .reveal h2{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:24px;
    color:var(--ink);
    margin:0 0 12px;
  }

  .reveal p{
    font-family:'Cormorant Garamond', serif;
    font-size:19px;
    color:#7a5560;
    line-height:1.5;
    margin:0 0 30px;
  }

  .wa-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:linear-gradient(135deg, #25D366, #1da851);
    color:#fff;
    text-decoration:none;
    font-weight:600;
    font-size:16px;
    padding:15px 30px;
    border-radius:999px;
    box-shadow:0 12px 26px -8px rgba(29,168,81,0.55);
    transition:transform .15s ease;
  }
  .wa-btn:hover{ transform:translateY(-2px) scale(1.03); }

  .wa-btn svg{ width:20px; height:20px; }

  @media (prefers-reduced-motion: reduce){
    .ambient span{ animation:none; display:none; }
  }
</style>
</head>
<body>

<div class="ambient" id="ambient"></div>

<div class="stage">
  <div class="card" id="card">

    <div class="ask" id="ask">
      <p class="eyebrow">A small question</p>
      <h1>Will you come to<br>my house? 🏡💕</h1>
      <p class="sub">no pressure... but I already cleaned up 😌</p>

      <div class="btn-row" id="btnRow">
        <button id="yes">Yes, I'll come 💖</button>
        <button id="no">No</button>
      </div>

      <p class="hint" id="hint">&nbsp;</p>
    </div>

    <div class="reveal" id="reveal">
      <div class="stamp">🎉💸</div>
      <h2>Yay! I knew you'd say yes</h2>
      <p>Now send me your account number on WhatsApp<br>so I can send transport money 🚕💌</p>
      <a class="wa-btn" id="waBtn" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16.004 3C9.377 3 4 8.373 4 15c0 2.29.638 4.428 1.744 6.253L4 29l7.938-1.687A11.93 11.93 0 0 0 16.004 27C22.63 27 28 21.627 28 15S22.63 3 16.004 3zm0 21.75c-1.94 0-3.75-.55-5.29-1.5l-.38-.226-4.71 1.001 1.005-4.593-.247-.395A9.71 9.71 0 0 1 6.25 15c0-5.385 4.381-9.75 9.754-9.75 5.385 0 9.75 4.381 9.75 9.766 0 5.373-4.381 9.734-9.75 9.734zm5.35-7.32c-.293-.147-1.734-.857-2.003-.955-.269-.098-.465-.147-.66.147-.196.293-.758.955-.929 1.152-.171.196-.343.22-.636.073-.293-.147-1.238-.456-2.359-1.455-.872-.778-1.462-1.739-1.633-2.032-.171-.293-.018-.451.129-.598.132-.132.293-.343.44-.514.147-.171.196-.293.293-.489.098-.196.049-.367-.024-.514-.073-.147-.66-1.591-.905-2.179-.238-.573-.481-.495-.66-.504l-.562-.01c-.196 0-.514.073-.783.367-.269.293-1.026 1.002-1.026 2.443 0 1.44 1.05 2.833 1.197 3.029.147.196 2.066 3.157 5.007 4.428.7.302 1.246.483 1.672.618.702.223 1.341.192 1.847.116.563-.084 1.734-.709 1.979-1.393.244-.685.244-1.271.171-1.393-.073-.122-.269-.196-.562-.343z"/></svg>
        Chat on WhatsApp
      </a>
    </div>

  </div>
</div>

<script>
  // ambient hearts
  const ambient = document.getElementById('ambient');
  const heartChars = ['💗','🤍','💫','♡'];
  for(let i=0;i<16;i++){
    const s = document.createElement('span');
    s.textContent = heartChars[Math.floor(Math.random()*heartChars.length)];
    s.style.left = Math.random()*100 + 'vw';
    s.style.setProperty('--dx', (Math.random()*80-40)+'px');
    s.style.fontSize = (14 + Math.random()*14) + 'px';
    s.style.animationDuration = (9 + Math.random()*8) + 's';
    s.style.animationDelay = (Math.random()*10) + 's';
    ambient.appendChild(s);
  }

  const noBtn = document.getElementById('no');
  const yesBtn = document.getElementById('yes');
  const hint = document.getElementById('hint');
  const btnRow = document.getElementById('btnRow');
  const card = document.getElementById('card');
  const ask = document.getElementById('ask');
  const reveal = document.getElementById('reveal');

  const messages = [
    "wait, are you sure? 🥺",
    "come on, just say yes 😅",
    "you can't catch me 😏",
    "the button says yes for a reason 👀",
    "okay now you're just trying 😂",
    "yes is right there... 👉",
    "my house misses you already 🏡",
    "last chance to be smooth about this 😌"
  ];
  let escapeCount = 0;
  let noWidth = 0, noHeight = 0;

  function escapeNo(){
    escapeCount++;

    if(!noBtn.classList.contains('escaping')){
      const rect = noBtn.getBoundingClientRect();
      noWidth = rect.width;
      noHeight = rect.height;
      noBtn.classList.add('escaping');
      noBtn.style.left = rect.left + 'px';
      noBtn.style.top = rect.top + 'px';
    }

    const margin = 16;
    const maxX = window.innerWidth - noWidth - margin;
    const maxY = window.innerHeight - noHeight - margin;
    const newX = Math.max(margin, Math.random() * maxX);
    const newY = Math.max(margin, Math.random() * maxY);

    noBtn.style.left = newX + 'px';
    noBtn.style.top = newY + 'px';

    hint.textContent = messages[Math.min(escapeCount - 1, messages.length - 1)];

    // yes button grows a little each time, capped
    const scale = Math.min(1 + escapeCount * 0.06, 1.6);
    yesBtn.style.transform = `scale(${scale})`;
  }

  noBtn.addEventListener('mouseenter', escapeNo);
  noBtn.addEventListener('click', (e) => { e.preventDefault(); escapeNo(); });
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); escapeNo(); }, { passive:false });

  yesBtn.addEventListener('click', () => {
    ask.style.opacity = '0';
    ask.style.transform = 'scale(0.96)';
    ask.style.transition = 'opacity .25s ease, transform .25s ease';
    setTimeout(() => {
      card.classList.add('flipped');
      reveal.classList.add('show');
    }, 220);
  });

  const phone = "2348105003834";
  const waMessage = encodeURIComponent("Hii, I'm coming over 💕 here's my account number for transport:");
  document.getElementById('waBtn').href = `https://wa.me/${phone}?text=${waMessage}`;
</script>
</body>
</html>
